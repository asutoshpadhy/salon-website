<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Salon</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif}
body{background:#f4efe6;color:#2b2b2b}

/* NAV */
header{display:flex;justify-content:space-between;align-items:center;padding:18px 30px;background:#fffaf3;position:fixed;top:0;width:100%;border-bottom:1px solid #e6dccf;z-index:1000}
nav{display:flex;gap:20px}
nav a{text-decoration:none;color:#2b2b2b;font-weight:500}
.menu-toggle{display:none;font-size:24px;cursor:pointer}

@media(max-width:768px){
 nav{position:absolute;top:70px;left:0;width:100%;background:#fffaf3;flex-direction:column;display:none;padding:10px}
 nav.active{display:flex}
 .menu-toggle{display:block}
}

section{padding:100px 30px 60px}
section h2{text-align:center;margin-bottom:25px}

/* HERO */
.carousel{position:relative;height:70vh;overflow:hidden}
.slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:1s}
.slide.active{opacity:1}
.hero-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;opacity:0;transition:1s}
.hero-text.active{opacity:1}
.hero-text h1{font-size:40px;background:rgba(0,0,0,0.4);padding:10px 20px;border-radius:10px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;border-radius:16px;border:1px solid #e6dccf;overflow:hidden}
.card img{width:100%;height:200px;object-fit:cover}
.card-content{padding:12px}

#gallery img{width:100%;height:280px;object-fit:cover;border-radius:12px}

.btn{background:#c8a97e;color:#fff;border:none;padding:8px 14px;border-radius:20px;cursor:pointer}

.review-card{background:#fff;padding:20px;border-radius:12px;border:1px solid #e6dccf;text-align:center}
.stars{color:#c8a97e;font-size:18px;margin:10px 0}

.contact-box{max-width:400px;margin:auto;background:#fff;padding:20px;border-radius:10px;display:flex;flex-direction:column;gap:10px}
.contact-box input,.contact-box textarea{padding:10px;border:1px solid #ccc;border-radius:6px}

.chat-box{position:fixed;bottom:20px;right:20px;width:340px;background:#fff;border-radius:16px;display:none;border:1px solid #ddd;z-index:1500;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
.chat-header{background:#c8a97e;color:#fff;padding:12px;display:flex;justify-content:space-between}
.chat-body{padding:15px;font-size:14px}
.chat-options{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chat-chip{padding:6px 12px;border:1px solid #c8a97e;border-radius:20px;cursor:pointer}
.chat-chip:hover{background:#c8a97e;color:#fff}
.chat-actions{display:flex;gap:8px;padding:10px}
.chat-actions input{flex:1;padding:6px}

.login-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center}
.login-box{background:#fff;padding:20px;border-radius:10px}
</style>
</head>
<body>

<header>
<h2>ELITE SALON</h2>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<nav id="navMenu">
<a href="#home">Home</a>
<a href="#services">Services</a>
<a href="#gallery">Gallery</a>
<a href="#reviews">Reviews</a>
<a href="#contact">Contact</a>
<a href="#" onclick="openLogin()">Login</a>
</nav>
</header>

<section id="home">
<div class="carousel">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1556228720-195a672e8a03')"></div>

<div class="hero-text active" id="heroText">
<h1>Look Good. Feel Better.</h1>
</div>
</div>
</section>

<section id="services">
<h2>Services</h2>
<div style="text-align:center;margin-bottom:15px">
<button class="btn" onclick="loadServices('Men')">Men</button>
<button class="btn" onclick="loadServices('Women')">Women</button>
</div>
<div id="serviceList" class="grid"></div>
</section>

<section id="gallery">
<h2>Gallery</h2>
<div class="grid">
<img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1">
<img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f">
<img src="https://images.unsplash.com/photo-1519699047748-de8e457a634e">
</div>
</section>

<section id="reviews">
<h2>Customer Reviews</h2>
<div class="grid">
<div class="review-card"><p>“Amazing bridal makeup!”</p><div class="stars">★★★★★</div><small>- Priya</small></div>
<div class="review-card"><p>“Best haircut in town.”</p><div class="stars">★★★★☆</div><small>- Rahul</small></div>
<div class="review-card"><p>“Loved pre-wedding package.”</p><div class="stars">★★★★★</div><small>- Ankit</small></div>
</div>
</section>

<section id="contact">
<h2>Contact Us</h2>
<div class="contact-box">
<input placeholder="Name">
<input placeholder="Email">
<textarea placeholder="Message"></textarea>
<button class="btn">Send</button>
</div>
</section>

<div class="login-modal" id="loginModal">
<div class="login-box">
<input id="username" placeholder="Enter name">
<button onclick="loginUser()">Login</button>
</div>
</div>

<div class="chat-box" id="chatBox">
<div class="chat-header"><span>Book Appointment</span><span onclick="toggleChat()">✖</span></div>
<div id="chatBody" class="chat-body"></div>
<div class="chat-actions">
<input type="date" id="dateInput">
<button onclick="confirmBooking()">OK</button>
</div>
</div>

<script>
// NAV MOBILE
function toggleMenu(){
 document.getElementById('navMenu').classList.toggle('active');
}

// carousel + text sync
let slides=document.querySelectorAll('.slide');
let heroText=document.getElementById('heroText');
let i=0;
setInterval(()=>{
 slides[i].classList.remove('active');
 heroText.classList.remove('active');

 i=(i+1)%slides.length;

 slides[i].classList.add('active');
 setTimeout(()=>heroText.classList.add('active'),200);
},3000);

let currentUser=localStorage.getItem('user');
let selectedService='';

const serviceData={
 Men:[
  {name:'Haircut',price:'₹300',time:'30 min',desc:'Classic haircut'},
  {name:'Beard Trim',price:'₹200',time:'20 min',desc:'Beard styling'},
  {name:'Groom Package',price:'₹999',time:'60 min',desc:'Haircut + Beard + Facial'},
  {name:'Pre-Wedding Groom',price:'₹1999',time:'90 min',desc:'Full grooming before wedding'}
 ],
 Women:[
  {name:'Haircut',price:'₹500',time:'40 min',desc:'Stylish haircut'},
  {name:'Facial',price:'₹700',time:'50 min',desc:'Glow facial'},
  {name:'Bridal Makeup',price:'₹5000',time:'120 min',desc:'HD bridal makeup'},
  {name:'Pre-Bridal Package',price:'₹7999',time:'180 min',desc:'Complete wedding prep'}
 ]
};

function loadServices(g){
 let container=document.getElementById('serviceList');
 container.innerHTML='';
 serviceData[g].forEach(s=>{
  let card=document.createElement('div');
  card.className='card';
  card.innerHTML=`<img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438"><div class="card-content"><h4>${s.name}</h4><p>${s.desc}</p><p><b>${s.price}</b> • ${s.time}</p><button class="btn" onclick="bookService('${s.name}')">Book</button></div>`;
  container.appendChild(card);
 });
}

function bookService(s){
 if(!currentUser){openLogin();return}
 toggleChat();
 selectService(s);
}

function openLogin(){document.getElementById('loginModal').style.display='flex'}
function loginUser(){
 let name=document.getElementById('username').value;
 if(!name)return alert('Enter name');
 localStorage.setItem('user',name);
 currentUser=name;
 document.getElementById('loginModal').style.display='none';
}

function toggleChat(){
 if(!currentUser){openLogin();return}
 let box=document.getElementById('chatBox');
 box.style.display=box.style.display==='block'?'none':'block';
 startChat();
}

function startChat(){
 let chat=document.getElementById('chatBody');
 chat.innerHTML='<b>Select Gender</b>';
 let div=document.createElement('div');
 div.className='chat-options';
 ['Men','Women'].forEach(g=>{
  let chip=document.createElement('div');
  chip.className='chat-chip';
  chip.innerText=g;
  chip.onclick=()=>showServicesChat(g);
  div.appendChild(chip);
 });
 chat.appendChild(div);
}

function showServicesChat(g){
 let chat=document.getElementById('chatBody');
 chat.innerHTML='<b>Select Service</b>';
 let div=document.createElement('div');
 div.className='chat-options';
 serviceData[g].forEach(s=>{
  let chip=document.createElement('div');
  chip.className='chat-chip';
  chip.innerText=s.name;
  chip.onclick=()=>selectService(s.name);
  div.appendChild(chip);
 });
 chat.appendChild(div);
}

function selectService(s){
 selectedService=s;
 document.getElementById('chatBody').innerHTML=`Hello ${currentUser}<br><b>${s}</b><br>Select date below`;
}

function confirmBooking(){
 let date=document.getElementById('dateInput').value;
 if(!selectedService||!date)return alert('Select all');
 let chat=document.getElementById('chatBody');
 chat.innerHTML=`✅ ${selectedService} booked on ${date}<br><br>Book another?`;

 let yes=document.createElement('button');
 yes.innerText='Yes'; yes.className='btn'; yes.onclick=startChat;
 let no=document.createElement('button');
 no.innerText='No'; no.className='btn'; no.onclick=toggleChat;

 chat.appendChild(yes);
 chat.appendChild(no);
}

let btn=document.createElement('div');
btn.innerHTML='💬 Book';
btn.style.position='fixed';
btn.style.bottom='20px';
btn.style.right='20px';
btn.style.background='#c8a97e';
btn.style.color='#fff';
btn.style.padding='10px 15px';
btn.style.borderRadius='20px';
btn.style.cursor='pointer';
btn.onclick=toggleChat;
document.body.appendChild(btn);
</script>

</body>
</html>
